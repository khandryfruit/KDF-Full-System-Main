kind = "web"
previewPath = "/saas-admin/"
title = "SaaS Super Admin"
version = "1.0.0"
id = "artifacts/saas-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/saas-admin/" ]
localPort = 21458

[services.development]
run = "pnpm --filter @workspace/saas-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saas-admin", "run", "build" ]
publicDir = "artifacts/saas-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21458"
BASE_PATH = "/saas-admin/"
