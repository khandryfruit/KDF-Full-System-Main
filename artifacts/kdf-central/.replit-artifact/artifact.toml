kind = "web"
previewPath = "/central/"
title = "KDF Central — Multi-Branch Dashboard"
version = "1.0.0"
id = "artifacts/kdf-central"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/central/" ]
localPort = 24699

[services.development]
run = "pnpm --filter @workspace/kdf-central run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kdf-central", "run", "build" ]
publicDir = "artifacts/kdf-central/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24699"
BASE_PATH = "/central/"
