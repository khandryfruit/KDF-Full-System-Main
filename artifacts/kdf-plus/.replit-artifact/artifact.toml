kind = "web"
previewPath = "/"
title = "KDF Plus Web Store"
version = "1.0.0"
id = "artifacts/kdf-plus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24300

[services.development]
run = "pnpm --filter @workspace/kdf-plus run dev"

[services.production]
build = [ "sh", "-c", "BASE_PATH=/ pnpm --filter @workspace/kdf-plus run build" ]
publicDir = "artifacts/kdf-plus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24300"
BASE_PATH = "/"
