<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>KDF Admin</title>
    <meta name="description" content="KDF NUTS operations & logistics admin panel" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KDF Admin" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("%BASE_URL%sw.js", { scope: "%BASE_URL%" })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
