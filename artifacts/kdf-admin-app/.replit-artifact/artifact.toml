kind = "web"
previewPath = "/"
title = "KDF Admin App"
version = "1.0.0"
id = "artifacts/kdf-admin-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23691

[services.development]
run = "pnpm --filter @workspace/kdf-admin-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kdf-admin-app", "run", "build" ]
publicDir = "artifacts/kdf-admin-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23691"
BASE_PATH = "/"
